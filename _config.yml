title: Pamela Efua Ofori
name: "Pamela Efua Ofori"
email: peofori@uninsubria.it
description: >-
  Write an awesome description for your new site here.
twitter_username: Pamelaofori2
github_username: PEOFORI
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
theme: minimal-mistakes  # Use this for GitHub Pages
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages

# Plugins (for GitHub Pages, only whitelisted plugins are allowed)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji

# No need for whitelist section in _config.yml for GitHub Pages? Actually, GitHub Pages uses a safe mode and only allows whitelisted plugins. The whitelist is not a configuration we set, but we must only use the allowed plugins.

author:
  name: "Pamela Efua Ofori"
  avatar: "/assets/images/IMG_0867.jpeg"
  bio: "PhD Candidate"
  location: "Varese, Italy"
  email: peofori@uninsubria.it
  
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Pamelaofori2"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/PEOFORI"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=9aWvNMUAAAAJ&hl=en&oi=ao"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-9952-3586"
    - label: "ResearchGate"
      icon: "fas fa-fw fa-flask"
      url: "https://www.researchgate.net/profile/Pamela-Efua-Ofori"

footer:
  content: '© 2025 Pamela Efua Ofori. Powered by Jekyll & Minimal Mistakes.'
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Pamelaofori2"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/PEOFORI"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=9aWvNMUAAAAJ&hl=en&oi=ao"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
